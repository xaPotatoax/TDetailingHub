<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T Detailing Hub</title>
  <style>
    body {
      background-color: #000;
      color: #FFD700;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    .btn {
      display: block;          /* vertical stack */
      width: 250px;            /* consistent button width */
      margin: 12px auto;       /* center each button */
      padding: 12px 24px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.3s;
    }
    .btn:hover {
      opacity: 0.85;
    }
    .bronze { background-color: #CD7F32; color: #fff; }
    .silver { background-color: #C0C0C0; color: #000; }
    .gold   { background-color: #FFD700; color: #000; }
    .red    { background-color: #B22222; color: #fff; }
    .green  { background-color: #28A745; color: #fff; } /* Call Us button */
    img.logo {
      width: 200px;   /* auto reduce to pixel size */
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <img src="logo.jpg" alt="T Detailing Logo" class="logo">

  <!-- Heading -->
  <h1 style="color:#B22222;">Connect with T Detailing</h1>

  <!-- Buttons stacked vertically -->
  <a href="https://www.instagram.com/tdetailing_official/?utm_source=ig_web_button_share_sheet" class="btn bronze">Instagram</a>
  <a href="https://xapotatoax.github.io/TDetailingHub/" class="btn silver">Facebook (coming soon)</a>
  <a href="https://tiktok.com/@yourprofile" class="btn gold">TikTok (coming soon)</a>

  <a href="tel:+15149801497" class="btn green">Call Us</a>
</body>
</html>
